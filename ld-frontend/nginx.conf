# LightningDeal 前端容器 Nginx 配置
# 作用：托管静态页面 + 把 /api、/ws 反代到后端容器
# 这样浏览器只访问前端一个地址，接口和 WebSocket 都能通

# 解决新版 nginx:alpine 在容器内 pid 文件写入权限问题
pid /tmp/nginx.pid;

server {
    listen 80;
    server_name _;

    # 前端静态资源（Vue 单页应用，刷新需回退到 index.html）
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # REST API 反代到后端容器
    # 注意：proxy_pass 不带尾部斜杠、不带路径，会原样保留 /api 前缀
    # 后端 server.servlet.context-path=/api，所以 /api/user/login -> backend:8080/api/user/login
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 50m;
    }

    # WebSocket 反代到后端容器（秒杀结果推送 / 大屏推送）
    # /ws/seckill/result/{userId}  /ws/dashboard
    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
