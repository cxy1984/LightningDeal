name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ==========================================
  # Job 1: 后端编译 + 单元测试
  # ==========================================
  backend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ld-backend

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: 编译后端
        run: mvn compile -q

      - name: 运行单元测试
        run: mvn test

      - name: 打包 jar
        run: mvn package -DskipTests -q

      - name: 上传 jar 包
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: ld-backend/target/lightning-deal-1.0.0-SNAPSHOT.jar

  # ==========================================
  # Job 2: 前端编译
  # ==========================================
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ld-frontend

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node 16
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: npm
          cache-dependency-path: ld-frontend/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 构建前端
        run: npm run build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ld-frontend/dist/

  # ==========================================
  # Job 3: Docker 镜像构建（可选，推送到 Docker Hub）
  # ==========================================
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    # 仅在推送 main 分支时执行（PR 时不构建镜像）
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载后端 jar
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: ld-backend/target/

      - name: 下载前端构建产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ld-frontend/dist/

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 构建并推送后端镜像
        uses: docker/build-push-action@v5
        with:
          context: ./ld-backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/lightning-deal-backend:latest

      - name: 构建并推送前端镜像
        uses: docker/build-push-action@v5
        with:
          context: ./ld-frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/lightning-deal-frontend:latest
