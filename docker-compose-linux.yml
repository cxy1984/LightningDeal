# ============================================================
# ⚡ LightningDeal —— Linux 服务器部署版
# 适用环境：CentOS 7，已有 MySQL 从库（只读）+ Jenkins（8080）
# 内网IP：130.133.5.8
# 说明：额外跑一个 MySQL 容器（端口 3307），不碰宿主机从库
# 用法：docker compose -f docker-compose-linux.yml up -d --build
# ============================================================

services:
  # ===== MySQL 5.7（独立容器，不与宿主机从库冲突）=====
  mysql:
    image: mysql:5.7
    container_name: ld-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 761761
      MYSQL_DATABASE: lightning_deal
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "127.0.0.1:3307:3306"   # 宿主机 3307 → 容器 3306，避免与宿主机 MySQL 冲突
    volumes:
      - mysql-data:/var/lib/mysql
      - ./ld-backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ld-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Redis 7 =====
  redis:
    image: redis:7-alpine
    container_name: ld-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ld-network

  # ===== RabbitMQ =====
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: ld-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - ld-network

  # ===== Elasticsearch 7.17 =====
  elasticsearch:
    image: elasticsearch:7.17.22
    container_name: ld-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - ld-network

  # ===== MinIO 对象存储 =====
  minio:
    image: minio/minio:latest
    container_name: ld-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - ld-network

  # ===== LightningDeal 后端 =====
  # ⚠️ 连容器内 MySQL（mysql:3306），不走宿主机从库
  # ⚠️ 后端映射 8081 端口（宿主机 8080 已被 Jenkins 占用）
  backend:
    build:
      context: ./ld-backend
      dockerfile: Dockerfile
    container_name: ld-backend
    restart: unless-stopped
    environment:
      # 连容器内的 MySQL（同在 ld-network）
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/lightning_deal?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowMultiQueries=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 761761
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "8081:8080"   # 宿主机 8081 → 容器 8080（避开 Jenkins 的 8080）
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ld-network

  # ===== LightningDeal 前端（Nginx 静态托管 + 反代后端）=====
  frontend:
    build:
      context: ./ld-frontend
      dockerfile: Dockerfile
    container_name: ld-frontend
    restart: unless-stopped
    ports:
      - "8090:80"   # 唯一对外端口
    depends_on:
      - backend
    networks:
      - ld-network

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  es-data:
  minio-data:

networks:
  ld-network:
    driver: bridge
